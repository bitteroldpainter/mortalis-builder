<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mortalis — Team Builder</title>
<style>
  :root{
    --bg:#0b0f14; --panel:linear-gradient(0deg, rgba(35,41,43,1), rgba(0,0,0,1)); --panel2:#3D3D3D;--panel3: linear-gradient(180deg, rgba(255,170,84,1), rgba(128,51,0,1));
    
    --text:#e9f0ff;--text2:#fff; --muted:#a7b2c6;

    /* NEW border color */
    --line:#FC970D;
   --line2:#000000;
    --accent:#42d3ff; --danger:#ff5c73; --ok:#66ffb3;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;background:#1D2024;color:var(--text)}

  /* NEW: match builders */
  .wrap{max-width:960px;margin:0 auto;padding:18px}

  .topbar{
  display:flex;
  flex-direction:column;          /* stack logo + controls */
  align-items:center;             /* center everything */
  gap:6px;                        /* reduce vertical space */
  margin-bottom:8px;              /* tighter overall spacing */
}
  .headerLogo{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.headerLogo img{
  height:150px;
  width:499px;
  object-fit:contain;
  display:block;
}
  .title{display:flex;flex-direction:column;gap:2px}
  .title h1{margin:0;font-size:25px;letter-spacing:.3px}
  .title .sub{color:var(--muted);font-size:12px}

.controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  width:100%;
  margin-top:0;
}

  
  button,.btn{
    background:var(--panel3); color:var(--text2);
    border:1px solid; var(--line2); border-radius:15px;
    padding:7px 9px; cursor:pointer; font-weight:500;
    font-size: 12px;
  }

  button.danger{
    background:linear-gradient(180deg, rgba(140,48,62,1), rgb(56, 0, 0)); color:var(--text2);
    border:1px solid; Border-color:#FC970D; border-radius:999px;text-shadow: #000000 2px 2px 4px;
    padding:10px 12px; cursor:pointer; font-weight:700;
    font-size: 12px;
  }
 
  button:hover{background: #ffa200}
  button.danger:hover{background: #d30000}
  button.accent{border-color:var(--line2);font-size: 12px;font-weight: 700;text-shadow: #000000 2px 2px 4px; padding:10px 12px;border-radius:999px;}
  button.accent:hover{filter:brightness(1.06)}
  button.accent2{border-color:var(--line);font-size: 12px;font-weight: 700;text-shadow: #000000 2px 2px 4px; padding:10px 12px;border-radius:999px;background:linear-gradient(180deg, rgb(98, 98, 98), rgb(24, 24, 24));}
  button.accent2:hover{background: #ffa200}
  input[type="file"]{display:none}


  .pill{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 12px;border-radius:999px;border:1px solid var(--line);
    background:linear-gradient(180deg, rgb(98, 98, 98), rgb(24, 24, 24));
    color:var(--text); font-weight:700;
    font-size: 12px;
    cursor:pointer;
    text-shadow: #000000 2px 2px 4px;
  }

    .pill2{
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 12px;border-radius:999px;border:1px solid var(--line);
    background:rgba(17,24,35,.7);
    color:var(--text); font-weight:700;
    cursor:pointer;
  }
  .pill:hover{background: #ffa200}

  .statsRow{display:grid;grid-template-columns:1fr;gap:10px;margin:10px 0 14px}
  @media (min-width:900px){
    .statsRow{grid-template-columns:repeat(auto-fit, minmax(220px, 1fr))}
  }
  .statCard{
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:12px 14px; min-height:92px;
  }
  .statCard .label{color:var(--muted);font-size:12px}
  .statCard .value{font-size:22px;font-weight:900;margin-top:4px}
  .statCard .notice{color:var(--muted);font-size:12px;line-height:1.35;margin-top:6px}

  .rowInline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .field, select{
    background:#0E2226;
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    color:var(--text);
    font-weight:800;
    outline:none;
  }
  select option{color:#0b0f14}
  .field{width:110px}
  .smallField{width:90px}

.stepBtn{
  width:40px;
  height:40px;
  border-radius:10px;
  padding:0;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  line-height:1;
}

  .grid{display:grid;grid-template-columns:1fr;gap:10px}
  @media (min-width:900px){
    .grid{grid-template-columns:1fr 1fr}
  }

  .fighter{
    background:rgba(17,24,35,.8);
    border:1px solid var(--line);
    border-radius:16px; overflow:hidden;
  }
  .fighterHead{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:12px 14px;background:linear-gradient(180deg, rgba(224,221,213,1), rgba(158,156,152,1));
  }
  .fighterHead .left{display:flex;flex-direction:column;gap:2px;min-width:0}
  .fighterHead .name{color:#000000;font-weight:900;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}
  .fighterHead .meta{color:#000000;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}
  .fighterHead .right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:0 0 auto}
  .fighterHead .actionsRow{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}

  .costTag{
    font-weight:900;
    border:1px solid var(--line);
    padding:6px 10px;
    border-radius:999px;
    background:#fff;
    color:#000000
  }

  details{border-top:1px solid var(--line)}
  details summary{list-style:none;cursor:pointer;padding:10px 14px;color:var(--muted);user-select:none}
  details summary::-webkit-details-marker{display:none}

  .body{padding:12px 14px;display:grid;gap:10px}
  .section{
    background:rgba(17,24,35,.55);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 12px
  }
  .section h3{margin:0 0 6px;font-size:12px;letter-spacing:.4px;color:var(--muted);text-transform:uppercase}

  .row{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px dashed rgba(0,115,107,.55)}
  .row:last-child{border-bottom:none}
  .row .l{min-width:0}
  .row .l b{font-weight:900}
  .row .l .small{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.25}
  .row .r{white-space:nowrap;font-weight:900}

  .kvs{display:flex;gap:10px;flex-wrap:wrap}
  .kv{
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px 10px;
    background:rgba(17,24,35,.35)
  }
  .kv .k{color:var(--muted);font-size:11px}
  .kv .v{font-size:14px;font-weight:900;margin-top:2px}

  .muted{color:var(--muted)}
  .notice{color:var(--muted);font-size:12px;line-height:1.35;margin-top:6px}
  .error{color:var(--danger);font-weight:800}
  .ok{color:var(--ok);font-weight:900}

  .toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .toggle input{transform:scale(1.1)}
</style>
</head>
<body>
  <div class="wrap">
<div class="topbar">
  <div class="headerLogo">
    <img src="fighterforge.png" alt="Fighter Forge Logo">
  </div>
  <div class="controls">
        <button class="accent" id="addFighterBtn">Build Fighter</button>
        <button class="accent2" id="exportBtn">Export Team (.json)</button>
         <label class="pill" for="fileInput">Load Fighters (.json)</label>
        <input id="fileInput" type="file" multiple accept=".json,application/json" />
        <label class="pill" for="teamInput">Load Team (.json)</label>
        <input id="teamInput" type="file" accept=".json,application/json" />
        <button class="danger" id="clearBtn">Clear Team</button>
      </div>
    </div>

    <div class="statsRow">

      <div class="statCard">
        <div class="label">Team Name</div>
        <div class="rowInline" style="margin-top:10px">
          <input id="warbandName" type="text"
                 placeholder="e.g. The Ashen Corsairs"
                 style="width:100%;min-width:0;background:#0E2226;border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--text);font-weight:900" />
        </div>
        <div class="notice">Saved in this browser and included in team export.</div>
      </div>
      <div class="statCard">
        <div class="label">Fighters</div>
        <div class="value" id="fighterCount">0</div>
        <div class="notice">Batch-load multiple files at once.</div>
      </div>

      <div class="statCard">
        <div class="label">Team Total Points</div>
        <div class="value" id="teamTotal">0</div>
        <div class="notice" id="limitNotice"></div>
      </div>

      <div class="statCard">
  <div class="label">Points Limit</div>
  <div class="rowInline" style="margin-top:10px">
    <input id="limitInput" class="field" type="number" min="0" step="1" value="400" title="0 disables limit"/>
    </div>
</div>

    </div>

    <div id="status" class="notice"></div>
    <div class="grid" id="list"></div>
  </div>

    catch (e) { return null; }
  }

  function normalizeUpgrades(upgrades) {
    return {
      poison: !!(upgrades && upgrades.poison),
      enchanted: !!(upgrades && upgrades.enchanted),
      cursed: !!(upgrades && upgrades.cursed),
      truestrike: !!(upgrades && upgrades.truestrike),
      masterCrafted: !!(upgrades && upgrades.masterCrafted)
    };
  }

  function findCurrentItem(srcArray, importedItem) {
    if (!Array.isArray(srcArray) || !importedItem) return null;
    const impId = (importedItem.id != null) ? String(importedItem.id) : "";
    const impName = (importedItem.name != null) ? String(importedItem.name) : "";

    if (impId) {
      for (const it of srcArray) {
        if (String(it.id) === impId) return it;
      }
    }
    if (impName) {
      for (const it of srcArray) {
        if (String(it.name) === impName) return it;
      }
    }
    return null;
  }

  function rebindWeaponList(importedList, srcArray) {
    if (!Array.isArray(importedList)) return [];
    const out = [];
    for (const item of importedList) {
      if (!item || typeof item !== "object") continue;
      const current = findCurrentItem(srcArray, item);
      if (current) {
        const rebound = {
          id: current.id,
          name: ((item.name != null && String(item.name).trim() && String(item.name) !== String(current.name)) ? String(item.name) : current.name),
          baseProfile: current.profile,
          profile: current.profile,
          basePoints: current.points,
          points: current.points,
          upgrades: normalizeUpgrades(item.upgrades)
        };
        if (item.displayNameOverride != null && String(item.displayNameOverride).trim()) {
          rebound.displayNameOverride = String(item.displayNameOverride);
        }
        out.push(rebound);
      } else {
        const fallback = {
          id: item.id,
          name: item.name || "Unknown",
          baseProfile: item.baseProfile || item.profile || "",
          profile: item.baseProfile || item.profile || "",
          basePoints: (item.basePoints != null ? item.basePoints : (item.points || 0)),
          points: (item.basePoints != null ? item.basePoints : (item.points || 0)),
          upgrades: normalizeUpgrades(item.upgrades)
        };
        if (item.displayNameOverride != null && String(item.displayNameOverride).trim()) {
          fallback.displayNameOverride = String(item.displayNameOverride);
        }
        out.push(fallback);
      }
    }
    return out;
  }

  function rebindSimpleList(importedList, srcArray, isSpell) {
    if (!Array.isArray(importedList)) return [];
    const out = [];
    for (const item of importedList) {
      if (!item || typeof item !== "object") continue;
      const current = findCurrentItem(srcArray, item);
      if (current) {
        const rebound = {
          id: current.id,
          name: ((item.name != null && String(item.name).trim() && String(item.name) !== String(current.name)) ? String(item.name) : current.name),
          points: (isSpell ? 0 : (current.points || 0)),
          profile: current.profile,
          effect: current.effect,
          dynamicType: current.dynamicType,
          dynamicFactor: current.dynamicFactor,
          cv: current.cv
        };
        if (item.displayNameOverride != null && String(item.displayNameOverride).trim()) {
          rebound.displayNameOverride = String(item.displayNameOverride);
        }
        out.push(rebound);
      } else {
        const fallback = {
          id: item.id,
          name: item.name || "Unknown",
          points: (isSpell ? 0 : (item.points || 0)),
          profile: item.profile,
          effect: item.effect,
          dynamicType: item.dynamicType,
          dynamicFactor: item.dynamicFactor,
          cv: item.cv
        };
        if (item.displayNameOverride != null && String(item.displayNameOverride).trim()) {
          fallback.displayNameOverride = String(item.displayNameOverride);
        }
        out.push(fallback);
      }
    }
    return out;
  }

  function computeWeaponUpgradeCostFor(weapon) {
    if (!weapon || !weapon.upgrades) return 0;
    let count = 0;
    if (weapon.upgrades.poison) count++;
    if (weapon.upgrades.enchanted) count++;
    if (weapon.upgrades.cursed) count++;
    if (weapon.upgrades.truestrike) count++;
    if (weapon.upgrades.masterCrafted) count++;
    if (count === 0) return 0;
    return 2 + (count - 1) * 4;
  }

  function recalcStatCostFor(f) {
    let total = 0;
    for (const cfg of STAT_CONFIG) {
      const base = cfg.base;
      const cur = f?.stats?.[cfg.key];
      if (cur === base) continue;
      const step = (cur > base) ? 1 : -1;
      const lowerIsBetter = !!cfg.lowerIsBetter;

      for (let v = base; v !== cur; v += step) {
        const next = v + step;
        const improving = lowerIsBetter ? (next < v) : (next > v);
        if (improving) total += cfg.upCost || 0;
        else total -= cfg.downCost || 0;
      }
    }
    f.points.stats = total;
  }

  function recalcWarlockCostFor(f) {
    let baseline = (f.points.base || 0) + (f.points.stats || 0);
    if (baseline < 0) baseline = 0;

    if (f.isMasterWarlock) f.points.warlock = Math.ceil(baseline * 0.66);
    else if (f.isWarlock) f.points.warlock = Math.ceil(baseline * 0.5);
    else f.points.warlock = 0;
  }

  function recalcWeaponPointsFor(f) {
    let sumCC = 0;
    let sumR = 0;

    for (const wc of (f.ccWeapons || [])) {
      const base = (wc.basePoints != null) ? wc.basePoints : (wc.points || 0);
      wc.points = base + computeWeaponUpgradeCostFor(wc);
      sumCC += wc.points;
    }

    for (const rw of (f.rangedWeapons || [])) {
      const baseR = (rw.basePoints != null) ? rw.basePoints : (rw.points || 0);
      rw.points = baseR + computeWeaponUpgradeCostFor(rw);
      sumR += rw.points;
    }

    f.points.ccWeapons = sumCC;
    f.points.rangedWeapons = sumR;
  }

  function recalcAbilityPointsFor(f) {
    let sumA = 0, sumL = 0, sumS = 0, sumE = 0;

    for (const ab of (f.abilities || [])) {
      let p = 0;
      if (ab.dynamicType === "percentHp") {
        const hp = f?.stats?.hp || 0;
        const factor = ab.dynamicFactor || 0;
        p = Math.ceil(hp * factor);
        ab.points = p;
      } else if (ab.dynamicType === "hpStat") {
        const hp2 = f?.stats?.hp || 0;
        const factor2 = (ab.dynamicFactor != null) ? ab.dynamicFactor : 1;
        p = Math.round(hp2 * factor2);
        ab.points = p;
      } else {
        p = ab.points || 0;
      }
      sumA += p;
    }

    for (const la of (f.leaderAbilities || [])) sumL += la.points || 0;
    for (const sp of (f.spells || [])) sumS += sp.points || 0;

    let baseline = (f.points.base || 0) + (f.points.stats || 0);
    if (baseline < 0) baseline = 0;

    for (const eq of (f.equipment || [])) {
      let ep = 0;
      if (eq.dynamicType === "percentStats") {
        const factorEq = eq.dynamicFactor || 0;
        ep = Math.ceil(baseline * factorEq);
        eq.points = ep;
      } else {
        ep = eq.points || 0;
      }
      sumE += ep;
    }

    f.points.abilities = sumA;
    f.points.leaderAbilities = sumL;
    f.points.spells = sumS;
    f.points.equipment = sumE;
  }

  function normalizeImportedFighter(f) {
    if (!f || typeof f !== "object") return f;

    const normalized = {
      name: f.name || "",
      isWarlock: !!f.isWarlock,
      isMasterWarlock: !!f.isMasterWarlock,
      portraitDataUrl: (typeof f.portraitDataUrl === "string") ? f.portraitDataUrl : "",
      portraitKey: (typeof f.portraitKey === "string") ? f.portraitKey : "",
      stats: Object.assign({}, f.stats || {}),
      ccWeapons: rebindWeaponList(f.ccWeapons, CC_WEAPONS),
      rangedWeapons: rebindWeaponList(f.rangedWeapons, RANGED_WEAPONS),
      abilities: rebindSimpleList(f.abilities, FIGHTER_ABILITIES, false),
      leaderAbilities: rebindSimpleList(f.leaderAbilities, LEADER_ABILITIES, false),
      spells: rebindSimpleList(f.spells, SPELLS, true),
      equipment: rebindSimpleList(f.equipment, EQUIPMENT, false),
      points: {}
    };

    const importedPoints = (f.points && typeof f.points === "object") ? f.points : {};
    normalized.points.base = (typeof importedPoints.base === "number") ? importedPoints.base : 16;

    recalcStatCostFor(normalized);
    recalcWarlockCostFor(normalized);
    recalcWeaponPointsFor(normalized);
    recalcAbilityPointsFor(normalized);

    return normalized;
  }

  function normalizePayloadWithCurrentRules(payload) {
    if (!payload || typeof payload !== "object") return payload;
    const cloned = deepClone(payload) || payload;
    if (cloned.fighter && typeof cloned.fighter === "object") {
      cloned.fighter = normalizeImportedFighter(cloned.fighter);
      return cloned;
    }
    return { fighter: normalizeImportedFighter(cloned) };
  }


  // ---- Roster <-> Fighter Builder bridge (localStorage) ----
  const TEAM_KEY = "mortalis_roster_team_state_v1";
  const EDIT_KEY = "mortalis_roster_edit_ctx_v1";

  // Change this filename to match where you place the Fighter Builder.
  const FIGHTER_BUILDER_URL = "mortalis_fighter_builder.html";

  // ---- IndexedDB Portrait Store (avoids localStorage quota) ----
  const PORTRAIT_DB_NAME = "warband_portraits_v1";
  const PORTRAIT_STORE   = "portraits";

  function openPortraitDB(){
    return new Promise((resolve, reject) => {
      try{
        const req = indexedDB.open(PORTRAIT_DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(PORTRAIT_STORE)) db.createObjectStore(PORTRAIT_STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      }catch(err){ reject(err); }
    });
  }
  async function portraitDBSet(key, dataUrl){
    if (!key) return;
    const db = await openPortraitDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(PORTRAIT_STORE, "readwrite");
      tx.objectStore(PORTRAIT_STORE).put(String(dataUrl || ""), String(key));
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }
  async function portraitDBGet(key){
    if (!key) return "";
    const db = await openPortraitDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(PORTRAIT_STORE, "readonly");
      const req = tx.objectStore(PORTRAIT_STORE).get(String(key));
      req.onsuccess = () => resolve(String(req.result || ""));
      req.onerror = () => reject(req.error);
    });
  }

  async function ensurePortraitStoredOnFighter(fighter, fallbackKey){
    try{
      if (!fighter || typeof fighter !== "object") return;
      const dataUrl = (typeof fighter.portraitDataUrl === "string") ? fighter.portraitDataUrl.trim() : "";
      if (!dataUrl) return;
      const key = (fighter.portraitKey && String(fighter.portraitKey).trim()) ? String(fighter.portraitKey).trim() : String(fallbackKey || "");
      const finalKey = key || ("p_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16));
      await portraitDBSet(finalKey, dataUrl);
      fighter.portraitKey = finalKey;
      fighter.portraitDataUrl = ""; // keep roster lean
    }catch(_){}
  }

  async function attachPortraitForExport(fighter){
    try{
      if (!fighter || typeof fighter !== "object") return;
      const has = (typeof fighter.portraitDataUrl === "string") ? fighter.portraitDataUrl.trim() : "";
      if (has) return;
      const key = (fighter.portraitKey && String(fighter.portraitKey).trim()) ? String(fighter.portraitKey).trim() : "";
      if (!key) return;
      const dataUrl = await portraitDBGet(key);
      if (dataUrl) fighter.portraitDataUrl = dataUrl;
    }catch(_){}
  }


    function saveTeamStateToBrowser(){
    // Store a lean team state in localStorage (no portrait bytes).
    // Portraits live in IndexedDB under fighter.portraitKey.
    function buildPayload(){
      return {
        version: 1,
        savedAt: new Date().toISOString(),
        warbandName: (warbandNameEl?.value || "").trim(),
        limit: safeNumber(limitInput.value),
        team: team.map(entry=>{
          const cloned = JSON.parse(JSON.stringify(entry));
          if (cloned?.data?.fighter){
            cloned.data.fighter.portraitDataUrl = "";
          }
          return cloned;
        })
      };
    }
    try{
      localStorage.setItem(TEAM_KEY, JSON.stringify(buildPayload()));
    }catch(e){
      // If even a lean payload fails (should be rare), do nothing rather than corrupting state.
    }
  }

  function loadTeamStateFromBrowser(){
    try{
      const raw = localStorage.getItem(TEAM_KEY);
      if (!raw) return false;
      const obj = JSON.parse(raw);
      if (!obj || typeof obj !== "object" || !Array.isArray(obj.team)) return false;

      // restore team and normalize fighters against current Mortalis rules
      team = obj.team.map(entry => {
        if (!entry || typeof entry !== "object") return entry;
        const cloned = deepClone(entry) || entry;
        if (cloned.data) cloned.data = normalizePayloadWithCurrentRules(cloned.data);
        return cloned;
      });

      // restore warband name / limit
      if (typeof obj.warbandName === "string" && warbandNameEl){
        warbandNameEl.value = obj.warbandName;
        saveWarbandName(obj.warbandName);
      }
      if (typeof obj.limit === "number") limitInput.value = String(Math.max(0, obj.limit));
      return true;
    }catch(e){
      return false;
    }
  }

  async function migrateExistingPortraitsToIndexedDB(){
    // If an older version stored portraitDataUrl inside roster entries, move them into IndexedDB once.
    try{
      for (const entry of (team || [])){
        await ensurePortraitStoredOnFighter(entry?.data?.fighter, entry?.id);
      }
    }catch(_){}
  }

  function getReturnUrl(){
    // Keep it simple: return to the current file without query/hash.
    const href = (window.location && window.location.href) ? window.location.href : "";
    return href.replace(/[#?].*$/, "");
  }

  function openFighterBuilder(mode, entryId){
    try{
      // persist current roster first
      saveTeamStateToBrowser();

      const ctx = {
        version: 1,
        mode: mode || (entryId ? "edit" : "new"),
        entryId: entryId || null,
        returnUrl: getReturnUrl(),
        startedAt: new Date().toISOString()
      };
      localStorage.setItem(EDIT_KEY, JSON.stringify(ctx));
    }catch(e){}

    // navigate to fighter builder
    window.location.href = FIGHTER_BUILDER_URL;
  }

  function startEditFighter(entryId){
    openFighterBuilder(entryId ? "edit" : "new", entryId || null);
  }

  function startGenerateCard(entryId){
    if (!entryId) return;
    openFighterBuilder("card", entryId);
  }


  function uid() {
    return "f_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  }
  function safeNumber(n) {
    return Number.isFinite(+n) ? +n : 0;
  }
  function fmtPts(n) {
    return `${safeNumber(n)} pts`;
  }
  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }


  // ---- Warband Name ----
  function loadWarbandName() {
    try { return localStorage.getItem(WARBAND_KEY) || ""; }
    catch { return ""; }
  }
  function saveWarbandName(name) {
    try { localStorage.setItem(WARBAND_KEY, String(name || "")); }
    catch {}
  }

  // ---- Fighter calculations & rendering ----
  function calcFighterTotal(f) {
    const p = f?.points;
    if (!p || typeof p !== "object") return 0;
    return Object.values(p).reduce((sum, v) => sum + safeNumber(v), 0);
  }
  function teamTotal() {
    return team.reduce((sum, entry) => sum + calcFighterTotal(entry.data.fighter), 0);
  }

  function detectGameApp(obj) {
    const app = (obj?.app || "").toLowerCase();
    if (app.includes("mortalis")) return "Mortalis";
    if (app.includes("dark realms")) return "Dark Realms";
    return obj?.app ? String(obj.app) : "Unknown";
  }

  function validateFighterJson(obj) {
    if (!obj || typeof obj !== "object") return "Not an object.";
    if (!obj.fighter || typeof obj.fighter !== "object") return "Missing 'fighter' object.";
    if (typeof obj.fighter.name !== "string") return "Missing fighter.name.";
    if (!obj.fighter.stats || typeof obj.fighter.stats !== "object") return "Missing fighter.stats.";
    if (!obj.fighter.points || typeof obj.fighter.points !== "object") return "Missing fighter.points breakdown.";
    return null;
  }

  function weaponUpgradesText(w) {
    const ups = w?.upgrades;
    if (!ups || typeof ups !== "object") return "";
    const on = Object.entries(ups).filter(([,v]) => !!v).map(([k]) => k);
    if (!on.length) return "";
    return "Upgrades: " + on.join(", ");
  }

  function render() {
    const total = teamTotal();
    const count = team.length;
    fighterCountEl.textContent = count;
    teamTotalEl.textContent = total;

    const limit = safeNumber(limitInput.value);
    if (limit > 0) {
      const remaining = limit - total;
      limitNotice.innerHTML = remaining < 0
        ? `<span class="error">Over by ${Math.abs(remaining)} pts</span>`
        : `<span class="ok">Remaining: ${remaining} pts</span>`;
    } else {
      limitNotice.textContent = "Limit disabled (0).";
    }

    if (count === 0) {
      listEl.innerHTML = `
        <div class="fighter" style="grid-column:1/-1">
          <div class="fighterHead">
            <div class="left">
              <div class="name">No fighters loaded</div>
              <div class="meta">Use “Load Fighter JSON(s)” above.</div>
            </div>
          </div>
        </div>`;

    }

    const listItems = (arr, label, renderItem) => {
      if (!Array.isArray(arr) || arr.length === 0) {
        return `<div class="section"><h3>${label}</h3><div class="muted">None</div></div>`;
      }
      return `<div class="section"><h3>${label}</h3>${arr.map(renderItem).join("")}</div>`;
    };

    const weaponItem = (w) => {
      const profile = w?.profile ?? w?.baseProfile ?? "";
      const basePts = (w?.basePoints != null) ? `Base: ${safeNumber(w.basePoints)} pts` : "";
      const upTxt = weaponUpgradesText(w);
      const smallLines = [profile, basePts, upTxt].filter(Boolean).map(x => `<div class="small">${escapeHtml(x)}</div>`).join("");
      return `
        <div class="row">
          <div class="l">
            <b>${escapeHtml(w?.name ?? "Unnamed")}</b>
            ${smallLines}
          </div>
          <div class="r">${fmtPts(w?.points ?? 0)}</div>
        </div>
      `;
    };

    const simpleItem = (it) => `
      <div class="row">
        <div class="l">
          <b>${escapeHtml(it?.name ?? "Unnamed")}</b>
          ${it?.effect ? `<div class="small">${it.effect}</div>` : ""}
          ${typeof it?.cv === "number" ? `<div class="small muted">CV: ${escapeHtml(it.cv)}</div>` : ""}
        </div>
        <div class="r">${fmtPts(it?.points ?? 0)}</div>
      </div>
    `;

    listEl.innerHTML = team.map((entry) => {
      const f = entry.data.fighter;
      const totalPts = calcFighterTotal(f);
      const appName = detectGameApp(entry.data);

      const role =
        f.isMasterWarlock ? "Master Warlock" :
        (f.isWarlock ? "Warlock" : "Fighter");

      const stats = f.stats || {};
      const statKVs = [
        ["Move", stats.move],
        ["DEF", stats.def],
        ["AP", stats.ap],
        ["HP", stats.hp],
        ["ATK", stats.atk],
        ["Fight", stats.fight],
        ["Shoot", stats.shoot],
      ].map(([k,v]) => `
        <div class="kv"><div class="k">${k}</div><div class="v">${escapeHtml(v ?? "")}</div></div>
      `).join("");

      const pointsBreakdownRows = Object.entries(f.points || {}).map(([k,v]) => `
        <div class="row">
          <div class="l"><b>${escapeHtml(k)}</b></div>
          <div class="r">${fmtPts(v)}</div>
        </div>
      `).join("");

      return `
        <div class="fighter" data-id="${entry.id}">
          <div class="fighterHead">
            <div class="left">
              <div class="name">${escapeHtml(f.name)} <span class="muted" style="font-weight:700"></span></div>
              <div class="meta">Source: ${escapeHtml(entry.sourceFileName || "—")}</div>
            </div>
            <div class="right">
              <div class="actionsRow">
                <div class="costTag">${fmtPts(totalPts)}</div>
                <button class="accent2" data-action="card" data-id="${entry.id}">Generate/Print Card</button>
              </div>
              <div class="actionsRow">
                <button class="accent" data-action="edit" data-id="${entry.id}">Edit</button>
                <button class="accent" data-action="dup" data-id="${entry.id}">Duplicate</button>
                <button class="danger" data-action="remove" data-id="${entry.id}">Remove</button>

          <details>
            <summary>Show Profile</summary>

              <div class="section">

              ${listItems(f.ccWeapons, "Close Combat Weapons", weaponItem)}
              ${listItems(f.rangedWeapons, "Ranged Weapons", weaponItem)}
              ${listItems(f.abilities, "Abilities", simpleItem)}

        </div>
      `;
    }).join("");

    // Persist roster to this browser so the Fighter Builder can open/edit fighters.
    saveTeamStateToBrowser();
  }

  function setStatus(msg, isError=false) {
    if (!msg) { statusEl.textContent = ""; return; }
    statusEl.innerHTML = isError ? `<span class="error">${escapeHtml(msg)}</span>` : escapeHtml(msg);
  }

  async function readFileAsText(file) {
    return await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result || ""));
      r.onerror = () => reject(r.error || new Error("Failed reading file"));
      r.readAsText(file);
    });
  }

  async function importFighterFiles(files) {
    const arr = Array.from(files || []);
    if (arr.length === 0) return;

    let added = 0;
    let skipped = 0;

    for (const file of arr) {
      try {
        const txt = await readFileAsText(file);
        const obj = JSON.parse(txt);
        const err = validateFighterJson(obj);
        if (err) { skipped++; continue; }
        const normalized = normalizePayloadWithCurrentRules(obj);
        const id = uid();
        await ensurePortraitStoredOnFighter(normalized?.fighter, id);
        team.push({ id, sourceFileName: file.name, data: normalized });
        added++;
      } catch {
        skipped++;
      }
    }

    if (added) setStatus(`Loaded ${added} fighter file(s). ${skipped ? `Skipped ${skipped}.` : ""}`);
    else setStatus(`No valid fighter files found.`, true);

    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  }

  function removeFighter(id) {
    team = team.filter(x => x.id !== id);
    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  }

  function duplicateFighter(id) {
    const entry = team.find(x => x.id === id);
    if (!entry) return;
    const clone = JSON.parse(JSON.stringify(entry.data));
    const name = clone?.fighter?.name || "Fighter";
    clone.fighter.name = name + " (Copy)";
    const normalizedClone = normalizePayloadWithCurrentRules(clone);
    team.push({ id: uid(), sourceFileName: entry.sourceFileName, data: normalizedClone });
    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  }

    async function exportTeam() {
    const exported = {
      app: "Mortalis / Dark Realms Team Builder",
      version: 1,
      savedAt: new Date().toISOString(),
      warbandName: (warbandNameEl?.value || "").trim(),
      limit: safeNumber(limitInput.value),
      fighters: []
    };

    for (const entry of team){
      const data = JSON.parse(JSON.stringify(entry.data));
      // Re-attach portrait bytes only for exported file
      if (data?.fighter){
        await attachPortraitForExport(data.fighter);
      }
      exported.fighters.push({ sourceFileName: entry.sourceFileName || "", fighterFile: data });
    }

    const blob = new Blob([JSON.stringify(exported, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    const wb = (warbandNameEl?.value || "").trim();
    const safe = (wb ? wb : "team_roster")
      .replace(/[^a-z0-9]+/gi, "_")
      .replace(/^_+|_+$/g, "")
      .slice(0, 60);

    a.download = `${safe}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    setStatus("Exported team_roster.json");
  }
  async function importTeamFile(file) {
    if (!file) return;
    try {
      const txt = await readFileAsText(file);
      const obj = JSON.parse(txt);
      if (!obj || typeof obj !== "object" || !Array.isArray(obj.fighters)) {
        setStatus("Not a valid team file (missing fighters array).", true);
        return;
      }

      // Restore warband name if present
      if (typeof obj.warbandName === "string" && warbandNameEl) {
        warbandNameEl.value = obj.warbandName;
        saveWarbandName(obj.warbandName);
      }

      // Restore limit if present (optional)
      if (typeof obj.limit === "number") limitInput.value = String(Math.max(0, obj.limit));

      const loaded = [];
      for (const item of obj.fighters) {
        const fighterFile = item?.fighterFile;
        const err = validateFighterJson(fighterFile);
        if (err) continue;
        const normalized = normalizePayloadWithCurrentRules(fighterFile);
        const id = uid();
        await ensurePortraitStoredOnFighter(normalized?.fighter, id);
        loaded.push({ id, sourceFileName: item?.sourceFileName || "", data: normalized });
      }
      team = loaded;
      setStatus(`Imported team: ${team.length} fighter(s).`);
      // Persist roster in-browser (used by the Fighter Builder bridge)
      saveTeamStateToBrowser();

      render();
    } catch (e) {
      setStatus(`Failed importing team file: ${e?.message || e}`, true);
    }
  }

  // ---- Events ----
  fileInput.addEventListener("change", async (e) => {
    setStatus("");
    await importFighterFiles(e.target.files);
    fileInput.value = "";
  });

  teamInput.addEventListener("change", async (e) => {
    setStatus("");
    const file = e.target.files?.[0];
    await importTeamFile(file);
    teamInput.value = "";
  });

  exportBtn.addEventListener("click", async () => {
    if (team.length === 0) return setStatus("Nothing to export.", true);
    await exportTeam();
  });

  clearBtn.addEventListener("click", () => {
    team = [];
    setStatus("Cleared team.");
    // Persist roster in-browser (used by the Fighter Builder bridge)
    saveTeamStateToBrowser();

    render();
  });

  if (addFighterBtn){
    addFighterBtn.addEventListener("click", () => {
      startEditFighter(null);
    });
  }

  listEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const action = btn.getAttribute("data-action");
    const id = btn.getAttribute("data-id");
    if (action === "card") startGenerateCard(id);
    if (action === "edit") startEditFighter(id);
    if (action === "remove") removeFighter(id);
    if (action === "dup") duplicateFighter(id);
  });

  limitInput.addEventListener("input", () => { saveTeamStateToBrowser(); render(); });

  // Warband name persistence
  if (warbandNameEl) {
    warbandNameEl.value = loadWarbandName();
    warbandNameEl.addEventListener("input", () => { saveWarbandName(warbandNameEl.value); saveTeamStateToBrowser(); });
  }

  // Try to restore an in-browser roster (used by the Fighter Builder bridge)
  loadTeamStateFromBrowser();
  // One-time migration: move any embedded portraitDataUrl into IndexedDB, then re-save a lean roster.
  migrateExistingPortraitsToIndexedDB().then(() => { saveTeamStateToBrowser(); render(); });
  return;

  render();
})();
</script>
</body>
</html>
